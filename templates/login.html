<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">

    <div class="flex min-h-screen">
        <div class="hidden lg:flex w-1/2 bg-indigo-600 justify-center items-center p-12 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-5xl font-bold mb-6">Smart Inventory</h1>
                <p class="text-indigo-100 text-lg max-w-md">
                    Advanced stock management with ML-powered predictions. 
                    Monitor your {{ filename }} assets in real-time.
                </p>
            </div>
            <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-indigo-500 rounded-full mix-blend-multiply opacity-70 filter blur-3xl"></div>
            <div class="absolute -top-20 -right-20 w-80 h-80 bg-blue-400 rounded-full mix-blend-multiply opacity-70 filter blur-3xl"></div>
        </div>

        <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
            <div class="max-w-md w-full">
                <div class="text-center lg:text-left mb-10">
                    <h2 class="text-3xl font-bold text-slate-800">Welcome Back</h2>
                    <p class="text-slate-500 mt-2">Log in to manage your inventory.</p>
                </div>

                <form action="/login" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                        <input type="text" name="username" required 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                            placeholder="Enter your username">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-semibold text-slate-700">Password</label>
                        </div>
                        <input type="password" name="password" required 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                            placeholder="••••••••">
                    </div>
                    
                    <div class="text-right mt-1">
                        <a href="/forgot_password" class="text-xs text-indigo-600 hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-0.5">
                        Login
                    </button>
                </form>

                <p class="text-center mt-8 text-slate-600">
                    Don't have an account? 
                    <a href="/register" class="text-indigo-600 font-bold hover:underline">Create Account</a>
                </p>
            </div>
        </div>
    </div>
    {% if error %}
    <script>
        Swal.fire({
            icon: 'error',
            title: 'Login Failed',
            text: '{{ error }}',
            confirmButtonColor: '#6366f1',
            background: '#ffffff',
            borderRadius: '1rem'
        });
    </script>
    {% endif %}
</body>
</html>
