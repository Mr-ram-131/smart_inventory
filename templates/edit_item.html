<h2>Edit Item</h2>

<form method="POST">
Name:
<input type="text" name="name" value="{{item.name}}"><br>

Quantity:
<input type="number" name="quantity" value="{{item.quantity}}"><br>

Price:
<input type="number" name="price" value="{{item.price}}"><br>

<button type="submit">Update</button>
</form>
