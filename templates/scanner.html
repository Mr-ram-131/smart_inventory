<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Scan Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #0f172a; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/50">
                <div class="w-10 h-10 bg-indigo-500 rounded-lg animate-pulse"></div>
            </div>
            <h1 class="text-3xl font-bold text-white">RFID Scan Station</h1>
            <p class="text-slate-400 mt-2">Simulate a hardware scan event below</p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700">
                <label class="block text-indigo-400 text-sm font-bold mb-4 uppercase tracking-widest">Select Product to Scan</label>
                <select id="rfid_selector" class="w-full bg-slate-900 text-white border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 transition-all">
                    {% for item in items %}
                    <option value="{{ item.rfid_tag }}">{{ item.name }} ({{ item.rfid_tag }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex gap-4">
                <button onclick="sendScan('in')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-6 rounded-2xl font-bold text-xl transition-all transform active:scale-95 shadow-lg shadow-emerald-900/20">
                    SCAN IN [+]
                </button>
                <button onclick="sendScan('out')" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white py-6 rounded-2xl font-bold text-xl transition-all transform active:scale-95 shadow-lg shadow-rose-900/20">
                    SCAN OUT [-]
                </button>
            </div>
        </div>

        <a href="/dashboard" class="inline-block mt-8 text-slate-500 hover:text-white transition-colors underline decoration-slate-700">Back to Dashboard</a>
    </div>

    <script>
        function sendScan(action) {
            const rfid = document.getElementById('rfid_selector').value;
            if(!rfid) return Swal.fire('Error', 'No item selected', 'error');
            
            // Redirect to the existing scan route
            window.location.href = `/scan/${rfid}/${action}`;
        }
    </script>
</body>
</html>
